<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>এলাকা ডেলিভারি - পার্সোনাল ফুড অ্যাপ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <header class="bg-red-500 text-white p-4 text-center shadow-lg">
        <h1 class="text-2xl font-bold">এলাকা ফুড ডেলিভারি</h1>
        <p class="text-sm">দ্রুত এবং ফ্রেশ খাবার আপনার দরজায়</p>
    </header>

    <main class="p-4 max-w-md mx-auto">
        
        <div class="grid gap-4">
            <div class="bg-white p-4 rounded-lg shadow flex justify-between items-center">
                <div>
                    <h3 class="font-bold">চিকেন বিরিয়ানি</h3>
                    <p class="text-gray-600">৳ ১৫০.০০</p>
                </div>
                <button onclick="addToCart('চিকেন বিরিয়ানি', 150)" class="bg-green-500 text-white px-4 py-2 rounded">যোগ করুন</button>
            </div>

            <div class="bg-white p-4 rounded-lg shadow flex justify-between items-center">
                <div>
                    <h3 class="font-bold">স্পেশাল বার্গার</h3>
                    <p class="text-gray-600">৳ ১২০.০০</p>
                </div>
                <button onclick="addToCart('স্পেশাল বার্গার', 120)" class="bg-green-500 text-white px-4 py-2 rounded">যোগ করুন</button>
            </div>
        </div>

        <div class="mt-8 bg-white p-6 rounded-lg shadow">
            <h2 class="text-xl font-bold mb-4 border-b pb-2">অর্ডার ডিটেইলস</h2>
            <div id="cartItems" class="mb-4 text-gray-700 italic text-sm">কার্ট খালি...</div>
            
            <input type="text" id="name" placeholder="আপনার নাম" class="w-full p-2 mb-2 border rounded">
            <input type="text" id="address" placeholder="বিস্তারিত ঠিকানা" class="w-full p-2 mb-2 border rounded">
            <p class="text-red-500 font-bold mb-4">বিকাশ করুন: ০১৭XXXXXXXX (পার্সোনাল)</p>
            <input type="text" id="trxId" placeholder="বিকাশ TrxID দিন" class="w-full p-2 mb-4 border rounded">
            
            <button onclick="sendOrder()" class="w-full bg-red-600 text-white py-3 rounded-lg font-bold hover:bg-red-700">অর্ডার কনফার্ম করুন (WhatsApp)</button>
        </div>
    </main>

    <script>
        let cart = [];
        let total = 0;

        function addToCart(item, price) {
            cart.push(item);
            total += price;
            document.getElementById('cartItems').innerText = "অর্ডার: " + cart.join(', ') + " | মোট: ৳" + total;
        }

        function sendOrder() {
            const name = document.getElementById('name').value;
            const address = document.getElementById('address').value;
            const trx = document.getElementById('trxId').value;
            const myNumber = "8801700000000"; // এখানে আপনার নিজের নম্বর দিন

            if(!name || !address || cart.length === 0) {
                alert("দয়া করে নাম, ঠিকানা এবং খাবার সিলেক্ট করুন!");
                return;
            }

            const message = `নতুন অর্ডার!\nনাম: ${name}\nঠিকানা: ${address}\nখাবার: ${cart.join(', ')}\nমোট টাকা: ৳${total}\nTrxID: ${trx}`;
            const whatsappUrl = `https://wa.me/${myNumber}?text=${encodeURIComponent(message)}`;
            
            window.open(whatsappUrl, '_blank');
        }
    </script>
</body>
</html>
